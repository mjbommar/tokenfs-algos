[graph]
all-features = true
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "x86_64-pc-windows-msvc",
    "aarch64-pc-windows-msvc",
    "aarch64-apple-darwin",
]

[advisories]
unmaintained = "workspace"
unsound = "all"
yanked = "deny"
ignore = []

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
deny = [
    { crate = "openssl", use-instead = "rustls", reason = "avoid OpenSSL in the core algorithms crate" },
    { crate = "openssl-sys", use-instead = "rustls", reason = "avoid OpenSSL FFI in the core algorithms crate" },
    { crate = "ring", reason = "avoid mandatory C/assembly crypto dependencies in the core algorithms crate" },
    { crate = "tokio", reason = "core algorithms must stay synchronous and kernel-adjacent" },
    { crate = "async-std", reason = "core algorithms must stay synchronous and kernel-adjacent" },
]

[licenses]
include-dev = true
confidence-threshold = 0.93
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "MIT",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
