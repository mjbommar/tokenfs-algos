name: iai-callgrind

# Deterministic hardware-counter benches via iai-callgrind under
# valgrind+callgrind. Complements `bench-regression.yml` (which runs
# wall-clock criterion benches at a 15% noise budget) with a tight ~1%
# instruction-count regression gate on a focused subset of hot
# primitives — popcount, streamvbyte encode/decode, sha256, vector
# dot/l2 (audit-R10 T3.4).
#
# How baselining works:
#   * On `main`, this workflow writes the iai output for the current
#     commit to `target/iai/.../tokenfs-algos/...` and uploads
#     `target/iai/` as an artifact named `iai-baseline-main`.
#   * On every push and PR, the workflow downloads the most recent
#     `iai-baseline-main` artifact, restores `target/iai/`, and re-runs
#     the benches with `--baseline=main` so iai-callgrind reports the
#     delta against `main` and fails the job on any benchmark whose
#     instruction count regresses by more than `THRESHOLD_PCT` (default
#     1.0%, configurable via workflow_dispatch).
#
# Local devs: `cargo xtask bench-iai` runs the same suite. Requires
# `valgrind` on PATH; without it the bench is silently skipped (see
# `docs/PROFILING.md`).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      threshold_pct:
        description: "Max acceptable %-instructions regression vs main baseline"
        required: false
        default: "1.0"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  THRESHOLD_PCT: ${{ inputs.threshold_pct || '1.0' }}

jobs:
  iai-bench:
    name: iai-callgrind regression check
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: rustup install stable --profile minimal

      - name: Install valgrind
        run: |
          sudo apt-get update
          sudo apt-get install -y valgrind
          valgrind --version

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: iai-bench

      - name: Install iai-callgrind-runner
        run: |
          # Pin runner version to dev-dep version to avoid drift between
          # what cargo bench compiled against and what the runner expects.
          cargo install iai-callgrind-runner --version 0.16 --locked

      - name: Download main baseline (best-effort)
        id: baseline
        uses: dawidd6/action-download-artifact@v6
        continue-on-error: true
        with:
          workflow: iai-bench.yml
          branch: main
          name: iai-baseline-main
          path: target/iai

      - name: Run iai benches against main baseline
        if: steps.baseline.outcome == 'success'
        run: |
          cargo bench -p tokenfs-algos \
            --features arch-pinned-kernels,userspace \
            --bench iai_primitives \
            -- --baseline=main \
               --regression="ir=${THRESHOLD_PCT}"

      - name: Run iai benches without baseline (first run / new branch)
        if: steps.baseline.outcome != 'success'
        run: |
          echo "::warning::no main baseline available; this run will become the baseline"
          cargo bench -p tokenfs-algos \
            --features arch-pinned-kernels,userspace \
            --bench iai_primitives

      - name: Save current as next main baseline (only on main)
        if: github.ref == 'refs/heads/main'
        run: |
          cargo bench -p tokenfs-algos \
            --features arch-pinned-kernels,userspace \
            --bench iai_primitives \
            -- --save-baseline=main

      - name: Upload baseline artifact (only on main)
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: iai-baseline-main
          path: target/iai
          if-no-files-found: error
          retention-days: 90
