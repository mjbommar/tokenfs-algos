name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 8 * * 1"
  workflow_dispatch: {}

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  supply-chain:
    name: supply chain
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Dependency review
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: moderate

      - name: cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          rust-version: nightly
          command: check
          arguments: --all-features

  kernel-core:
    name: kernel core guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check no_std and dependency guard
        run: cargo xtask security

  feature-combinations:
    name: feature combinations
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-hack
        run: cargo install cargo-hack --locked

      - name: Check each public feature
        run: cargo hack check -p tokenfs-algos --each-feature --no-dev-deps --lib

      - name: Check two-feature combinations
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: cargo hack check -p tokenfs-algos --feature-powerset --depth 2 --no-dev-deps --lib

  fuzz-smoke:
    name: fuzz smoke
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        target:
          - byteclass_utf8_dispatch_parity
          - chunk_fastcdc_no_panic
          - chunk_gear_no_panic
          - ngram_windows_no_panic
          - runlength_transitions_dispatch_parity
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Run fuzz target briefly
        run: cargo +nightly fuzz run ${{ matrix.target }} -- -runs=512
