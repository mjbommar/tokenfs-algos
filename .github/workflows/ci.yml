name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ============================================================================
  # Native test matrix — every architecture / OS combination GitHub Actions
  # offers (excluding deprecated Intel macOS). Each job logs CPU facts so the
  # runner-side hardware-acceleration coverage is visible in test output.
  # ============================================================================
  native:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x86_64 (AVX2)
            runner: ubuntu-latest
            arch: x86_64
            os: linux
            simd_features: ""
          - label: linux-aarch64 (NEON)
            runner: ubuntu-24.04-arm
            arch: aarch64
            os: linux
            simd_features: ""
          - label: windows-x86_64
            runner: windows-latest
            arch: x86_64
            os: windows
            simd_features: ""
          - label: windows-aarch64
            runner: windows-11-arm
            arch: aarch64
            os: windows
            simd_features: ""
          - label: macos-aarch64 (Apple Silicon NEON)
            runner: macos-latest
            arch: aarch64
            os: macos
            simd_features: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy, rust-src, llvm-tools-preview

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          # Distinguish caches per (runner, arch, os) so cross-arch traffic
          # doesn't poison each other.
          shared-key: ${{ matrix.runner }}-${{ matrix.arch }}

      # --- log hardware facts so the CI history shows what each job ran on ---
      - name: Log CPU info (Linux)
        if: matrix.os == 'linux'
        run: |
          echo "===== /proc/cpuinfo (model + flags) ====="
          grep -E '^(model name|flags|Features|CPU implementer|CPU part)' /proc/cpuinfo | sort -u | head -40
          echo
          echo "===== lscpu ====="
          lscpu || true
          echo
          echo "===== nproc / kernel ====="
          nproc; uname -a

      - name: Log CPU info (macOS)
        if: matrix.os == 'macos'
        run: |
          echo "===== sysctl machdep.cpu ====="
          sysctl machdep.cpu | head -40
          echo
          echo "===== sysctl hw ====="
          sysctl hw | head -30
          echo
          echo "===== uname ====="
          uname -a

      - name: Log CPU info (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          Write-Host "===== Get-CimInstance Win32_Processor ====="
          Get-CimInstance Win32_Processor | Format-List Manufacturer,Name,Architecture,NumberOfCores,NumberOfLogicalProcessors,L2CacheSize,L3CacheSize
          Write-Host "===== systeminfo ====="
          systeminfo | Select-String -Pattern "OS|System Type|Processor"

      # --- core build + test ---
      - name: Check (default features)
        run: cargo check -p tokenfs-algos --all-targets

      - name: Test (default features)
        run: cargo test -p tokenfs-algos --all-targets

      # Compile-only validation that the library builds with no_std and no
      # SIMD features. Tests are not run here: most require `alloc` (Vec /
      # vec!) which is not enabled in this configuration.
      - name: Check (no default features)
        run: cargo check -p tokenfs-algos --no-default-features --lib

      # Same shape with `alloc` enabled — verifies the no_std + alloc
      # posture every storage-layer-adjacent caller will use. Test
      # compile is intentionally NOT attempted here: test-only code
      # (proptest, criterion, serde_json dev-deps; vec!/format! macros)
      # requires `std` and would balloon the surface for no benefit.
      # See `docs/NO_STD_POSTURE.md` for the documented matrix.
      - name: Check (no default features + alloc)
        run: cargo check -p tokenfs-algos --no-default-features --features alloc --lib

      - name: Test (with std + tunes-json)
        run: cargo test -p tokenfs-algos --features tunes-json

      - name: Test (parallel feature)
        run: cargo test -p tokenfs-algos --features parallel

      - name: Test (bench-internals feature)
        run: cargo test -p tokenfs-algos --features bench-internals

      # SVE2 backends only compile under target_arch = "aarch64" + the
      # `sve` / `sve2` cargo features. The Linux Cobalt-100 runner has
      # SVE2 hardware (svebitperm + sveaes + svesha3 + svesm4 + svebf16
      # + svei8mm); without this step the SVE parity tests never fire
      # against real silicon. Restricted to linux-aarch64 because the
      # macOS GitHub-hosted runner is Apple M1 (NO SVE), and Windows
      # aarch64 (Cobalt-100) has SVE2 but the runner image's cargo
      # toolchain doesn't reliably ship the SVE intrinsic crate path
      # — re-enable for windows-aarch64 once verified.
      - name: Test (SVE/SVE2 features on linux-aarch64)
        if: matrix.label == 'linux-aarch64 (NEON)'
        run: cargo test -p tokenfs-algos --features nightly,sve,sve2

      - name: Build benchmarks (no-run, smoke-check)
        # Per-bench required-features in Cargo.toml: primitives needs
        # bench-internals + arch-pinned-kernels; similarity needs userspace
        # + arch-pinned-kernels; planner needs nothing extra (audit-R10 T0.1).
        run: |
          cargo bench -p tokenfs-algos \
            --features bench-internals,arch-pinned-kernels,userspace \
            --bench primitives --no-run
          cargo bench -p tokenfs-algos \
            --features userspace,arch-pinned-kernels \
            --bench similarity --no-run
          cargo bench -p tokenfs-algos --bench planner --no-run

      - name: Clippy (default features)
        # Pull in arch-pinned-kernels so clippy sees the per-backend modules
        # (their `unsafe` surface is the highest-value part to lint).
        run: cargo clippy -p tokenfs-algos --tests --benches \
          --features bench-internals,tunes-json,userspace,arch-pinned-kernels -- -D warnings

      - name: Panic-surface lint (audit-R10 T1.6)
        # Fails on ungated `assert!` / `panic!` / etc. inside `pub fn`
        # bodies that would surface a panic in non-userspace builds.
        # Snapshot of known sites lives in
        # tools/xtask/panic_surface_allowlist.txt.
        run: cargo xtask panic-surface-lint

      - name: Run dispatch_explain (logs the runner's planner choices)
        # dispatch_explain example required-features = ["userspace"] (audit-R10 T0.1).
        run: cargo run -p tokenfs-algos --example dispatch_explain --release \
          --features userspace

      # --- per-runner micro-benchmarks (scalar vs SIMD) ---
      # Output is a TSV: one row per (primitive, backend, payload_bytes).
      # The aggregator job downloads every runner's TSV and joins them
      # into a single markdown report on the workflow summary.
      - name: Run bench_compare (TSV per architecture)
        env:
          RUNNER_LABEL: ${{ matrix.label }}
        shell: bash
        run: |
          set -euo pipefail
          # Sanitize the matrix label into a filename-safe slug.
          slug=$(printf '%s' "${{ matrix.label }}" | tr ' /()' '-' | tr -s '-')
          out="perf-${slug}.tsv"
          # Enable nightly+sve+sve2 so the SVE2 bench arms compile in.
          # The cfg gates inside the kernels also require target_arch=aarch64,
          # so on x86 runners the features are effectively no-ops; on
          # aarch64 they activate the runtime-detected SVE/SVE2 paths.
          cargo run -p tokenfs-algos --example bench_compare --release \
            --features nightly,sve,sve2 > "$out"
          echo "=== $out ==="
          cat "$out"

      - name: Upload perf TSV artifact
        uses: actions/upload-artifact@v7
        with:
          name: perf-${{ matrix.label }}
          path: perf-*.tsv
          if-no-files-found: error
          retention-days: 30

  # ============================================================================
  # Aggregator: download every native runner's perf TSV and join them into
  # a single markdown report on the workflow summary. Lets you eyeball
  # "how does AVX2 stack up against Apple-Silicon NEON on this commit"
  # without leaving the GitHub Actions UI. Artifacts also stay available
  # for 30 days for downstream trending.
  # ============================================================================
  perf-report:
    name: perf cross-arch report
    needs: native
    runs-on: ubuntu-latest
    if: always() && needs.native.result != 'cancelled'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download all perf artifacts (this workflow run)
        uses: actions/download-artifact@v8
        with:
          pattern: perf-*
          merge-multiple: true
          path: perf-data

      # The AVX-512 numbers come from a separate workflow (`CI (AVX-512
      # self-hosted)`), so they aren't in this run's artifacts. Find the
      # AVX-512 run for the same SHA, wait briefly for it to complete,
      # then download its perf TSV(s) into the same `perf-data` dir.
      # Best-effort: if the AVX-512 workflow isn't running (e.g. self-
      # hosted runner offline) the aggregator continues without it.
      - name: Pull AVX-512 perf artifact (cross-workflow, best effort)
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          # Up to 5 minutes of polling; AVX-512 workflow normally finishes
          # in <60s on the self-hosted Zen 4 runner (s7).
          for attempt in $(seq 1 30); do
            avx_run=$(gh run list \
              --branch main \
              --workflow 'CI (AVX-512 self-hosted)' \
              --limit 10 \
              --json databaseId,headSha,status \
              --jq ".[] | select(.headSha==\"${{ github.sha }}\") | .databaseId" \
              | head -1 || true)
            if [ -z "$avx_run" ]; then
              echo "no AVX-512 run for SHA ${{ github.sha }} yet (attempt $attempt)"
              sleep 10
              continue
            fi
            status=$(gh run view "$avx_run" --json status --jq '.status' 2>/dev/null || echo unknown)
            if [ "$status" = "completed" ]; then
              echo "AVX-512 run $avx_run completed; downloading perf artifact"
              # gh run download nests each artifact under its own directory;
              # flatten into perf-data so the aggregator's `perf-*.tsv`
              # glob picks the AVX-512 TSV up alongside the matrix runners.
              rm -rf /tmp/avx-perf && mkdir -p /tmp/avx-perf
              gh run download "$avx_run" --pattern 'perf-avx512-*' --dir /tmp/avx-perf 2>&1 || \
                echo "no perf-avx512 artifact in run $avx_run (likely older commit)"
              find /tmp/avx-perf -name 'perf-*.tsv' -exec cp {} perf-data/ \; || true
              break
            fi
            echo "AVX-512 run $avx_run status=$status (attempt $attempt); waiting..."
            sleep 10
          done

      - name: List downloaded files
        run: ls -la perf-data || true

      - name: Aggregate into markdown summary
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -d perf-data ] || [ -z "$(ls perf-data/perf-*.tsv 2>/dev/null)" ]; then
            echo "no perf TSVs found — skipping aggregation" | tee -a "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          python3 tools/perf/aggregate_perf.py perf-data/perf-*.tsv > perf-summary.md
          cat perf-summary.md >> "$GITHUB_STEP_SUMMARY"
          echo "--- joined report ---"
          cat perf-summary.md

      - name: Upload joined perf report
        uses: actions/upload-artifact@v7
        with:
          name: perf-summary
          path: perf-summary.md
          if-no-files-found: warn
          retention-days: 90

  # ============================================================================
  # Cross-compile / QEMU emulation. Builds aarch64 binaries on x86 then runs
  # them under QEMU-user — cheap correctness gate that complements the native
  # aarch64 jobs. Catches regressions between full GitHub-hosted aarch64 runs.
  # ============================================================================
  cross-aarch64-qemu:
    name: cross-aarch64-qemu (correctness gate)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: aarch64-unknown-linux-gnu
          components: rustfmt, clippy, rust-src

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: cross-aarch64

      - name: Install cross-toolchain + qemu-user
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu libc6-dev-arm64-cross qemu-user

      - name: Check (default features)
        run: cargo check -p tokenfs-algos --target aarch64-unknown-linux-gnu --all-targets

      - name: Test under QEMU (default features)
        run: cargo test -p tokenfs-algos --target aarch64-unknown-linux-gnu

      - name: Test under QEMU (NEON parity)
        run: cargo test -p tokenfs-algos --target aarch64-unknown-linux-gnu --test neon_parity

      - name: Test under QEMU (with calibration disabled — gates skip)
        run: cargo test -p tokenfs-algos --target aarch64-unknown-linux-gnu --features tunes-json,parallel

  # ============================================================================
  # Fuzz target build smoke test — ensures the cargo-fuzz harnesses keep
  # compiling. Doesn't run extended fuzz cycles on every push.
  # ============================================================================
  fuzz-build:
    name: fuzz-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src, llvm-tools-preview

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: fuzz

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz

      - name: Build all fuzz targets
        # Build the entire fuzz manifest in one shot (faster than per-target)
        # so all 13 declared targets are exercised by CI (audit-R10 T1.4 +
        # T0.2). Adding a new fuzz_targets/<name>.rs + [[bin]] entry is
        # all it takes; CI builds it automatically.
        run: |
          cd fuzz
          cargo +nightly fuzz build

      - name: Smoke-fuzz each target (15s)
        # Distinguish "no crash in 15s" (timeout exit 124) from "crashed"
        # (any other non-zero) — audit-R10 T1.5: do NOT swallow crashes
        # with `|| true`. A crash MUST fail the job; a timeout is the
        # documented happy outcome.
        run: |
          cd fuzz
          # Discover every declared target from the binaries cargo-fuzz
          # built rather than maintaining a hand-curated list.
          targets=$(cargo +nightly fuzz list)
          fail=0
          for target in $targets; do
            echo "=== smoking $target for 15s ==="
            set +e
            timeout 25 cargo +nightly fuzz run "$target" -- -max_total_time=15
            status=$?
            set -e
            if [ "$status" -eq 124 ]; then
              echo "  ($target) timed out as expected — no crash"
            elif [ "$status" -ne 0 ]; then
              echo "  ($target) FAILED with exit $status — fuzzer crash"
              fail=1
            fi
          done
          exit "$fail"

  # ============================================================================
  # Format + lint check (architecture-independent, fast).
  # ============================================================================
  format:
    name: format + lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: format

      - name: Format
        run: cargo fmt --check

      - name: Clippy (all features, deny warnings)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Doc check
        run: cargo doc --workspace --no-deps --all-features
        env:
          RUSTDOCFLAGS: "-D warnings"
