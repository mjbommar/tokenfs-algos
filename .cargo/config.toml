[alias]
xtask = "run -p xtask --"

# Cross-test under QEMU for AArch64 (NEON parity tests).
# Requires: gcc-aarch64-linux-gnu, libc6-dev-arm64-cross, qemu-user (apt).
# Run with: cargo test --target aarch64-unknown-linux-gnu
[target.aarch64-unknown-linux-gnu]
linker = "aarch64-linux-gnu-gcc"
runner = "tools/cross-runner/qemu-aarch64.sh"
