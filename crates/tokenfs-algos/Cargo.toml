[package]
name = "tokenfs-algos"
version = "0.1.0"
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Hardware-accelerated byte-stream analysis primitives for TokenFS and related systems."
readme = "../../README.md"
publish = false

[features]
default = ["std", "avx2", "neon"]
std = []
alloc = []
nightly = []
bench-internals = []
calibration = ["std"]
parallel = ["dep:rayon"]
avx2 = []
avx512 = ["nightly"]
# AVX-512 sub-feature backends. All gate runtime detection (`is_x86_feature_
# detected!`) on the corresponding feature; compile-time gating uses only the
# umbrella `avx512` flag to keep the feature matrix small. The named features
# below are kept as dependent aliases so callers can express intent — they
# are no-ops at present beyond requiring `avx512`.
avx512_vbmi = ["avx512"]
avx512_vbmi2 = ["avx512"]
avx512_bitalg = ["avx512"]
avx512_gfni = ["avx512"]
avx512_vpclmulqdq = ["avx512"]
neon = []
sve = ["nightly"]
sve2 = ["nightly"]
# JSON loading for planner Tunes (see dispatch::planner::tunes::Tunes::from_json).
tunes-json = ["std", "dep:serde_json"]
# BLAKE3 content-addressable hash backend. Wraps the `blake3` crate
# (CC0-1.0 OR Apache-2.0 OR Apache-2.0-with-LLVM-exception, MIT-compatible)
# which already ships hand-tuned SSE4.1 / AVX2 / AVX-512 / NEON kernels;
# leaving it opt-in keeps the dependency surface tight for callers that
# only need SHA-256 or non-cryptographic mixers.
blake3 = ["dep:blake3", "std"]

[dependencies]
cfg-if.workspace = true
bytemuck = { version = "1", optional = true }
libm = "0.2"
rayon = { version = "1", optional = true }
serde_json = { version = "1", optional = true }
blake3 = { version = "1", default-features = false, features = ["std"], optional = true }

[dev-dependencies]
criterion = "0.8"
proptest = "1"
serde_json = "1"

[[bench]]
name = "histogram"
harness = false
required-features = ["bench-internals"]

[[bench]]
name = "primitives"
harness = false
required-features = ["bench-internals"]

[[bench]]
name = "similarity"
harness = false

[[bench]]
name = "planner"
harness = false

[[bench]]
name = "hash_batched"
harness = false

[[bench]]
name = "bits_popcount"
harness = false

[lints]
workspace = true
