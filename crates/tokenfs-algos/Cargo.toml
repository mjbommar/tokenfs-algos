[package]
name = "tokenfs-algos"
version = "0.1.0"
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Hardware-accelerated byte-stream analysis primitives for TokenFS and related systems."
readme = "../../README.md"
publish = false

[features]
default = ["std", "avx2", "neon"]
std = []
alloc = []
nightly = []
bench-internals = []
parallel = ["dep:rayon"]
avx2 = []
avx512 = ["nightly"]
neon = []
sve = ["nightly"]
sve2 = ["nightly"]

[dependencies]
cfg-if.workspace = true
bytemuck = { version = "1", optional = true }
rayon = { version = "1", optional = true }

[dev-dependencies]
criterion = "0.5"
hex-literal = "0.4"
proptest = "1"

[[bench]]
name = "histogram"
harness = false
required-features = ["bench-internals"]

[lints]
workspace = true
